{% extends 'evaluations/base.html' %}

{% block content %}
<section class="card p-4 p-md-5 fade-up">
	<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
		<h2 class="h4 card-title mb-0">{{ title }}</h2>
		<a class="btn btn-sm btn-outline-primary-soft" href="{% url 'dashboard' %}">العودة للوحة الرئيسية</a>
	</div>

	<form method="post" class="row g-3">
		{% csrf_token %}
		{{ form.as_p }}
		<div>
			<button class="btn btn-primary-soft px-4" type="submit">حفظ البيانات</button>
		</div>
	</form>
</section>
{% endblock %}
