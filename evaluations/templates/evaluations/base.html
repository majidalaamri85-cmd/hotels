{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5, user-scalable=yes">
	<meta name="theme-color" content="#14532d">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="نظام التقييم">
	<meta name="description" content="منصة إلكترونية لإدارة تقييمات ومعايير تصنيف الفنادق">
	<title>نظام تقييم الفنادق</title>
	
	<!-- Preconnect for performance -->
	<link rel="preconnect" href="https://cdn.jsdelivr.net">
	<link rel="dns-prefetch" href="https://fonts.googleapis.com">
	<link rel="dns-prefetch" href="https://fonts.gstatic.com">
	
	<!-- Bootstrap RTL CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" media="print" onload="this.media='all'">
	<noscript><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet"></noscript>
	
	<!-- Main CSS -->
	<link href="{% static 'css/main.css' %}?v=20260515" rel="stylesheet">
	
	<!-- Optimize font loading -->
	<link rel="preload" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
	<noscript><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"></noscript>
	
	<!-- Progressive Web App -->
	<link rel="manifest" href="{% static 'manifest.json' %}">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/ministry-logo.png' %}">
	<link rel="apple-touch-icon" href="{% static 'images/ministry-logo.png' %}">
</head>
<body>
	<header class="hero py-1 py-sm-1" role="banner">
		<div class="container-fluid px-3 px-sm-4 position-relative">
			<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 gap-md-3">
				<div class="d-flex align-items-center gap-2 gap-md-3 hero-brand-wrap flex-wrap">
					<div class="hero-logo-wrap" aria-hidden="true">
						<img 
							src="{% static 'images/ministry-logo.png' %}" 
							alt="شعار وزارة التراث والسياحة" 
							class="hero-logo" 
							loading="lazy"
							onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
						>
						<div class="hero-logo-fallback" style="display:none;">عُمان</div>
					</div>
					<div class="flex-grow-1">
						<h1 class="hero-title h5 h4-md mb-1">سلطنة عُمان - وزارة التراث والسياحة</h1>
						<p class="hero-subtitle mb-0">منصة إلكترونية لإدارة تقييمات ومعايير تصنيف الفنادق</p>
					</div>
				</div>
			</div>
		</div>
	</header>

	<main class="container-fluid px-3 px-sm-4 py-3 py-sm-4" role="main">
		{% if messages %}
			<div role="region" aria-live="polite" aria-atomic="true">
				{% for m in messages %}
					<div class="alert alert-success alert-dismissible fade show fade-up" role="alert">
						{{ m }}
						<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
					</div>
				{% endfor %}
			</div>
		{% endif %}

		{% block content %}{% endblock %}
	</main>

	<!-- Bootstrap JS Bundle (with Popper) -->
	<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	
	<!-- Performance optimization script -->
	<script defer src="{% static 'js/optimize.js' %}"></script>
	
	<!-- Inline optimization scripts -->
	<script>
		// Enable smooth scrolling for navigation
		if ('scrollRestoration' in window.history) {
			window.history.scrollRestoration = 'manual';
		}
		
		// Detect connection type for adaptive loading
		if ('connection' in navigator) {
			const conn = navigator.connection;
			if (conn.saveData || conn.effectiveType === '4g') {
				document.documentElement.classList.add(conn.saveData ? 'save-data' : 'fast-connection');
			}
		}
		
		// Service Worker registration for offline support
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('{% static "sw.js" %}').catch(() => {
				// Service worker not available, continue normally
			});
		}
	</script>
</body>
</html>
