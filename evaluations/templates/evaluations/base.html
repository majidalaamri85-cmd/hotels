{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5, user-scalable=yes">
	<meta name="theme-color" content="#14532d">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="نظام التقييم">
	<meta name="description" content="منصة إلكترونية لإدارة تقييمات ومعايير تصنيف الفنادق">
	<title>نظام تقييم الفنادق</title>

	<link rel="preconnect" href="https://cdn.jsdelivr.net">
	<link rel="dns-prefetch" href="https://fonts.googleapis.com">
	<link rel="dns-prefetch" href="https://fonts.gstatic.com">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" media="print" onload="this.media='all'">
	<noscript><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet"></noscript>
	<link href="{% static 'css/main.css' %}?v=20260516" rel="stylesheet">
	<link rel="preload" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
	<noscript><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"></noscript>
	<link rel="manifest" href="{% static 'manifest.json' %}">
	<link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/ministry-logo.png' %}">
	<link rel="apple-touch-icon" href="{% static 'images/ministry-logo.png' %}">
</head>
<body>
	<header class="app-header" role="banner">
		<div class="container-fluid px-3 px-sm-4">
			<div class="header-inner">
				<a class="brand-lockup" href="{% url 'dashboard' %}" aria-label="العودة للوحة الرئيسية">
					<span class="brand-logo-wrap" aria-hidden="true">
						<img
							src="{% static 'images/ministry-logo.png' %}"
							alt=""
							class="brand-logo"
							loading="lazy"
							onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
						>
						<span class="brand-logo-fallback" style="display:none;">عُمان</span>
					</span>
					<span class="brand-copy">
						<span class="brand-kicker">وزارة التراث والسياحة</span>
						<span class="brand-title">نظام تقييم الفنادق</span>
						<span class="brand-subtitle">إدارة الزيارات والتقييمات الميدانية</span>
					</span>
				</a>
				<nav class="header-actions" aria-label="روابط سريعة">
					<a class="btn btn-sm btn-ghost" href="{% url 'dashboard' %}">الرئيسية</a>
					<a class="btn btn-sm btn-light-action" href="{% url 'hotel_create' %}">إضافة فندق</a>
					<a class="btn btn-sm btn-primary-soft" href="{% url 'evaluation_create' %}">تقييم جديد</a>
				</nav>
			</div>
		</div>
	</header>

	<main class="container-fluid px-3 px-sm-4 py-3 py-sm-4" role="main">
		{% if messages %}
			<div class="message-stack" role="region" aria-live="polite" aria-atomic="true">
				{% for m in messages %}
					<div class="alert alert-success alert-dismissible fade show fade-up" role="alert">
						{{ m }}
						<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="إغلاق"></button>
					</div>
				{% endfor %}
			</div>
		{% endif %}

		{% block content %}{% endblock %}
	</main>

	<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script defer src="{% static 'js/optimize.js' %}"></script>
	<script>
		if ('scrollRestoration' in window.history) {
			window.history.scrollRestoration = 'manual';
		}

		if ('connection' in navigator) {
			const conn = navigator.connection;
			if (conn.saveData || conn.effectiveType === '4g') {
				document.documentElement.classList.add(conn.saveData ? 'save-data' : 'fast-connection');
			}
		}

		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('{% static "sw.js" %}').catch(() => {});
		}
	</script>
</body>
</html>
